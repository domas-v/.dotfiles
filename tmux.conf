### GENERAL OPTS ###
set -g mouse on  # mouse
set-option -g focus-events on # enable terminal focus tracking 
set-option -g allow-rename off # don't rename windows automatically

# set session numbering to start at 1
bind -T prefix s choose-tree -s -Z -K "#{?#{e|<:#{line},9},#{e|+:#{line},1},#{?#{e|<:#{line},36},M-#{a:#{e|+:97,#{e|-:#{line},10}}},}}"

### VISUALS ###
set -g base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows on
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none
set -g extended-keys-format csi-u
set -g extended-keys on
set -gq allow-passthrough on
set -g message-style "fg=black bg=#8972ac bold"
set -g default-terminal "tmux-256color"
set -ga terminal-features ',*terminalName*:extkeys'
setw -g mode-style 'fg=black bg=#8972ac bold'


### STATUS LINE ###
set -g status-position bottom
set -g status-justify centre
# set -g status-style 'fg=red bg=black'
set -g status-style 'default'

# session name
# set -g status-left '#[fg=black,bg=red,bold] 󰒋 #S '
set -g status-left '#[fg=black,bg=#8972ac,bold] 󰒋 #S '
set -g status-left-length 40

set -g status-right ''
set -g status-right-length 0

# window style
setw -g window-status-current-style 'fg=black bg=#8972ac'
setw -g window-status-current-format ' #I #W #F '

setw -g window-status-style 'fg=#8972ac bg=black'
setw -g window-status-format ' #I #[fg=white]#W #[fg=#8972ac]#F '

setw -g window-status-bell-style 'fg=black bg=#8972ac bold'


### VI MODE ###
unbind-key -T copy-mode-vi v
setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection     # Begin selection in copy mode.
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle  # Begin selection in copy mode.
bind-key -T copy-mode-vi 'y' send -X copy-selection      # Yank selection in copy mode.

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind v split-window -v -p 30 -c "#{pane_current_path}"

bind-key o swap-window -t -1\; select-window -t -1
bind-key i swap-window -t +1\; select-window -t +1

bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

bind-key -n C-Up    resize-pane -U 8
bind-key -n C-Down  resize-pane -D 8
bind-key -n C-Left  resize-pane -L 8
bind-key -n C-Right resize-pane -R 8

bind-key -n C-S-Left select-layout even-vertical
bind-key -n C-S-Right select-layout even-horizontal


### SMART PANE SWITCHING ###
# with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l


### POP SELECTORS
bind o display-popup -E "tmux list-windows -a -F '#{window_activity} #{session_name}:#{window_index}: #{window_name}' | sort -rn | cut -d' ' -f2- | grep -v \"^$(tmux display-message -p '#S:#I'):\" | fzf --reverse | sed -E 's/: .*//' | xargs tmux switch-client -t"
bind O display-popup -E "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse | xargs tmux switch-client -t"


### PLUGINS
set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

bind t run "#{@popup-toggle} -w75% -h75% -Ed'##{pane_current_path}'"
bind Q run "#{@popup-toggle} -E -w70% -h85% --name=quick-notes -d ~/Desktop/Notes nvim quick_note.md"
set -g @popup-toggle-mode 'force-close'
set -g @popup-autostart on # Turn on autostart to boost the first call of @popup-toggle. 
set -g @plugin 'loichyan/tmux-toggle-popup'

run '~/.tmux/plugins/tpm/tpm'
